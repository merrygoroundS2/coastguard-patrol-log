<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="해양경찰청 위치·시간 기록 기반 일지보고서 자동 생성 서비스">
    <meta name="theme-color" content="#0a1628">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="일지보고서">
    <meta name="mobile-web-app-capable" content="yes">
    <title>일지보고서 생성 서비스</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" href="/icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- 헤더 -->
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="2" />
                        <path d="M20 8 L20 20 L28 26" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <circle cx="20" cy="20" r="3" fill="currentColor" />
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>일지보고서 생성 서비스</h1>
                    <p>위치·시간 기록 기반 자동 보고서 작성</p>
                </div>
            </div>
            <div class="header-time" id="headerTime"></div>
        </div>
    </header>

    <main class="main">
        <!-- 현재 상태 카드 -->
        <section class="status-section">
            <div class="status-grid">
                <!-- 현재 위치 -->
                <div class="status-card location-card">
                    <div class="status-card-header">
                        <div class="status-icon location-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                                <circle cx="12" cy="10" r="3" />
                            </svg>
                        </div>
                        <span class="status-label">현재 위치</span>
                        <button class="btn-refresh" id="btnRefreshLocation" title="위치 새로고침">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M23 4v6h-6" />
                                <path d="M1 20v-6h6" />
                                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
                            </svg>
                        </button>
                    </div>
                    <div class="status-content">
                        <div class="status-value" id="currentAddress">
                            <span class="loading-pulse">위치를 확인하는 중...</span>
                        </div>
                        <div class="status-detail" id="currentCoords">위도: -- / 경도: --</div>
                    </div>
                </div>

                <!-- 현재 시간 -->
                <div class="status-card time-card">
                    <div class="status-card-header">
                        <div class="status-icon time-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10" />
                                <path d="M12 6v6l4 2" />
                            </svg>
                        </div>
                        <span class="status-label">현재 시각</span>
                    </div>
                    <div class="status-content">
                        <div class="status-value" id="currentTime">--:--:--</div>
                        <div class="status-detail" id="currentDate">----년 --월 --일</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 활동 기록 입력 -->
        <section class="input-section">
            <div class="section-header">
                <h2>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="section-icon">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                    </svg>
                    활동 기록 입력
                </h2>
            </div>

            <form id="recordForm" class="record-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="startTime">시작 시각</label>
                        <input type="datetime-local" id="startTime" required>
                    </div>
                    <div class="form-group">
                        <label for="endTime">종료 시각</label>
                        <input type="datetime-local" id="endTime" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="activity">활동 내용</label>
                    <input type="text" id="activity" placeholder="예: 해상 순찰, 구조 활동, 점검 업무..." required>
                </div>

                <div class="form-row">
                    <div class="form-group flex-2">
                        <label for="addressInput">위치 (주소)</label>
                        <input type="text" id="addressInput" placeholder="현재 위치가 자동 입력됩니다" readonly>
                    </div>
                    <div class="form-group">
                        <label for="note">비고</label>
                        <input type="text" id="note" placeholder="(선택사항)">
                    </div>
                </div>

                <input type="hidden" id="latitude">
                <input type="hidden" id="longitude">

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="btnUseCurrentTime">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <path d="M12 6v6l4 2" />
                        </svg>
                        현재 시각 사용
                    </button>
                    <button type="submit" class="btn btn-primary" id="btnAddRecord">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19" />
                            <line x1="5" y1="12" x2="19" y2="12" />
                        </svg>
                        기록 추가
                    </button>
                </div>
            </form>
        </section>

        <!-- 기록 목록 -->
        <section class="records-section">
            <div class="section-header">
                <h2>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="section-icon">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14,2 14,8 20,8" />
                        <line x1="16" y1="13" x2="8" y2="13" />
                        <line x1="16" y1="17" x2="8" y2="17" />
                        <polyline points="10,9 9,9 8,9" />
                    </svg>
                    기록 목록
                </h2>
                <div class="records-actions">
                    <label class="checkbox-label">
                        <input type="checkbox" id="selectAll">
                        <span>전체 선택</span>
                    </label>
                    <span class="record-count" id="recordCount">0건</span>
                </div>
            </div>

            <div class="records-table-wrapper">
                <table class="records-table" id="recordsTable">
                    <thead>
                        <tr>
                            <th class="col-check"><input type="checkbox" id="selectAllHead"></th>
                            <th class="col-date">날짜</th>
                            <th class="col-time">시간</th>
                            <th class="col-location">위치</th>
                            <th class="col-activity">활동 내용</th>
                            <th class="col-note">비고</th>
                            <th class="col-action">삭제</th>
                        </tr>
                    </thead>
                    <tbody id="recordsBody">
                        <!-- 동적으로 추가 -->
                    </tbody>
                </table>
                <div class="empty-state" id="emptyState">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14,2 14,8 20,8" />
                    </svg>
                    <p>아직 기록이 없습니다</p>
                    <span>위에서 활동을 기록해주세요</span>
                </div>
            </div>
        </section>

        <!-- 보고서 생성 -->
        <section class="report-section">
            <div class="section-header">
                <h2>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="section-icon">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7,10 12,15 17,10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    보고서 생성
                </h2>
            </div>

            <div class="report-form">
                <div class="form-group">
                    <label for="authorName">작성자</label>
                    <input type="text" id="authorName" placeholder="작성자 이름을 입력하세요">
                </div>

                <button class="btn btn-generate" id="btnGenerate">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14,2 14,8 20,8" />
                        <line x1="16" y1="13" x2="8" y2="13" />
                        <line x1="16" y1="17" x2="8" y2="17" />
                    </svg>
                    한글파일(.hwpx) 보고서 생성 및 다운로드
                </button>
            </div>
        </section>
    </main>

    <!-- 모바일 하단 네비게이션 -->
    <nav class="mobile-nav">
        <button class="mobile-nav-item active" data-target="status-section" id="navStatus">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                <circle cx="12" cy="10" r="3" />
            </svg>
            <span>위치</span>
        </button>
        <button class="mobile-nav-item" data-target="input-section" id="navInput">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
            </svg>
            <span>기록</span>
        </button>
        <button class="mobile-nav-item" data-target="records-section" id="navRecords">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14,2 14,8 20,8" />
            </svg>
            <span>목록</span>
        </button>
        <button class="mobile-nav-item" data-target="report-section" id="navReport">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="7,10 12,15 17,10" />
                <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            <span>보고서</span>
        </button>
    </nav>

    <!-- 앱 설치 배너 -->
    <div class="install-banner" id="installBanner">
        <div class="install-banner-content">
            <img src="/icons/icon-192.png" alt="앱 아이콘" class="install-icon">
            <div class="install-text">
                <strong>홈 화면에 추가</strong>
                <span>앱처럼 빠르게 실행하세요</span>
            </div>
        </div>
        <div class="install-actions">
            <button class="btn-install-dismiss" id="installDismiss">닫기</button>
            <button class="btn-install" id="installBtn">설치</button>
        </div>
    </div>

    <!-- 토스트 알림 -->
    <div class="toast-container" id="toastContainer"></div>

    <footer class="footer">
        <p>해양경찰청 일지보고서 생성 서비스 &copy; 2026</p>
    </footer>

    <script src="app.js"></script>
</body>

</html>
